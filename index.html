<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bijak Math - Portal Pembelajaran Matematik</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #333;
        }

        .container {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 40px 30px;
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        .logo-area {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        h1 {
            color: #2c3e50;
            font-size: 2.2rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        p.subtitle {
            color: #7f8c8d;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .button-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .app-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            text-decoration: none;
            padding: 18px 25px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .app-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.5);
            background: linear-gradient(135deg, #2980b9 0%, #2573a7 100%);
        }

        .app-btn:active {
            transform: translateY(-1px);
        }

        .btn-icon {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 1rem;
        }

        /* Variasi warna lembut untuk setiap tahun supaya menarik */
        .btn-t1 { background: linear-gradient(135deg, #FF6B6B 0%, #EE5253 100%); box-shadow: 0 4px 15px rgba(238, 82, 83, 0.3); }
        .btn-t1:hover { background: linear-gradient(135deg, #EE5253 0%, #D63031 100%); }

        .btn-t2 { background: linear-gradient(135deg, #FF9F43 0%, #F39C12 100%); box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3); }
        .btn-t2:hover { background: linear-gradient(135deg, #F39C12 0%, #E67E22 100%); }

        .btn-t3 { background: linear-gradient(135deg, #10AC84 0%, #1DD1A1 100%); box-shadow: 0 4px 15px rgba(29, 209, 161, 0.3); }
        .btn-t3:hover { background: linear-gradient(135deg, #1DD1A1 0%, #10AC84 100%); }

        .btn-t4 { background: linear-gradient(135deg, #2E86DE 0%, #54A0FF 100%); box-shadow: 0 4px 15px rgba(84, 160, 255, 0.3); }
        .btn-t4:hover { background: linear-gradient(135deg, #54A0FF 0%, #2E86DE 100%); }

        .btn-t5 { background: linear-gradient(135deg, #9B59B6 0%, #8E44AD 100%); box-shadow: 0 4px 15px rgba(142, 68, 173, 0.3); }
        .btn-t5:hover { background: linear-gradient(135deg, #8E44AD 0%, #7D3C98 100%); }

        .btn-t6 { background: linear-gradient(135deg, #34495E 0%, #2C3E50 100%); box-shadow: 0 4px 15px rgba(44, 62, 80, 0.3); }
        .btn-t6:hover { background: linear-gradient(135deg, #2C3E50 0%, #1A252F 100%); }

        footer {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-area">🧮✨</div>
        <h1>Bijak Math</h1>
        <p class="subtitle">Pilih tahun untuk memulakan pembelajaran interaktif anda</p>

        <div class="button-grid">
            <a href="https://bijakdigital21-lang.github.io/tahun1/" class="app-btn btn-t1" target="_blank">
                <span>BIJAK MATH TAHUN 1</span>
                <span class="btn-icon">MULA</span>
            </a>
            
            <a href="https://bijakdigital21-lang.github.io/tahun2/" class="app-btn btn-t2" target="_blank">
                <span>BIJAK MATH TAHUN 2</span>
                <span class="btn-icon">MULA</span>
            </a>
            
            <a href="https://bijakdigital21-lang.github.io/tahun3/" class="app-btn btn-t3" target="_blank">
                <span>BIJAK MATH TAHUN 3</span>
                <span class="btn-icon">MULA</span>
            </a>
            
            <a href="https://bijakdigital21-lang.github.io/tahun4/" class="app-btn btn-t4" target="_blank">
                <span>BIJAK MATH TAHUN 4</span>
                <span class="btn-icon">MULA</span>
            </a>
            
            <a href="https://bijakdigital21-lang.github.io/tahun5/" class="app-btn btn-t5" target="_blank">
                <span>BIJAK MATH TAHUN 5</span>
                <span class="btn-icon">MULA</span>
            </a>
            
            <a href="https://bijakdigital21-lang.github.io/tahun6/" class="app-btn btn-t6" target="_blank">
                <span>BIJAK MATH TAHUN 6</span>
                <span class="btn-icon">MULA</span>
            </a>
        </div>

        <footer>
            &copy; 2026 Bijak Math. Hak Cipta Terpelihara.
        </footer>
    </div>

</body>
</html>
